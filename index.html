<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblically Accurate Angels</title>

    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body>
    <style>
      body {
        font-family: Arial, sans-serif;
      }

      .app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .board {
        position: relative;
        display: grid;
        grid-template-columns: repeat(15, 50px);
        grid-template-rows: repeat(15, 50px);
        border: 2px solid #222;
        background: #111;
      }

      .score {
        font-size: 24px;
        font-weight: bold;
      }

      .message {
        min-height: 24px;
        font-weight: bold;
      }

      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      button {
        padding: 8px 14px;
        cursor: pointer;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        font-size: 24px;
        font-weight: bold;
      }
    </style>

    <div id="root"></div>

    <script type="text/babel">
      const root = document.getElementById("root");
      const reactRoot = ReactDOM.createRoot(root);
      const BOARD_SIZE = 15;
      const GAME_STATUS = {
        MENU: "menu",
        PLAYING: "playing",
        GAME_OVER: "gameOver",
      };
      const INITIAL_SNAKE = [
        { x: 7, y: 8 },
        { x: 6, y: 8 },
        { x: 5, y: 8 },
      ];
      const DIRECTION_STEPS = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
      };
      const KEY_TO_DIRECTION = {
        ArrowUp: "ArrowUp",
        ArrowDown: "ArrowDown",
        ArrowLeft: "ArrowLeft",
        ArrowRight: "ArrowRight",
        w: "ArrowUp",
        s: "ArrowDown",
        a: "ArrowLeft",
        d: "ArrowRight",
      };

      const createInitialSnake = (direction = "ArrowRight") => {
        const head = INITIAL_SNAKE[0];
        const step = DIRECTION_STEPS[direction];

        return INITIAL_SNAKE.map((_, index) => ({
          x: head.x - step.x * index,
          y: head.y - step.y * index,
        }));
      };

      const getRandomFood = (snake) => {
        let food = null;

        while (!food) {
          const candidate = {
            x: Math.floor(Math.random() * BOARD_SIZE) + 1,
            y: Math.floor(Math.random() * BOARD_SIZE) + 1,
          };

          const onSnake = snake.some(
            (part) => part.x === candidate.x && part.y === candidate.y
          );

          if (!onSnake) {
            food = candidate;
          }
        }

        return food;
      };

      const Segment = ({ x, y, isHead }) => {
        const style = {
          width: "50px",
          height: "50px",
          background: isHead ? "darkgreen" : "green",
          boxSizing: "border-box",
          border: "1px dashed lime",
          gridColumn: x,
          gridRow: y,
          transition: "all 0.15s linear",
        };

        return <div style={style} />;
      };

      const Snake = ({ snake }) => {
        return (
          <>
            {snake.map((part, index) => (
              <Segment
                key={index}
                x={part.x}
                y={part.y}
                isHead={index === 0}
              />
            ))}
          </>
        );
      };

      const Food = ({ food }) => {
        const style = {
          width: "50px",
          height: "50px",
          background: "crimson",
          borderRadius: "50%",
          boxSizing: "border-box",
          border: "4px solid pink",
          gridColumn: food.x,
          gridRow: food.y,
          transition: "all 0.15s linear",
        };

        return <div style={style} />;
      };

      const Score = ({ score, level }) => {
        return (
          <div className="score">
            Score: {score} | Nivel: {level}
          </div>
        );
      };

      const Board = ({ snake, food, status }) => {
        return (
          <main className="board">
            <Snake snake={snake} />
            <Food food={food} />
            {status === GAME_STATUS.MENU && (
              <div className="overlay">Presiona iniciar</div>
            )}
            {status === GAME_STATUS.GAME_OVER && (
              <div className="overlay">Game Over</div>
            )}
          </main>
        );
      };

      const Game = () => {
        const [direction, setDirection] = React.useState("ArrowRight");
        const [snake, setSnake] = React.useState(() =>
          createInitialSnake()
        );
        const [food, setFood] = React.useState(() =>
          getRandomFood(createInitialSnake())
        );
        const [score, setScore] = React.useState(0);
        const [status, setStatus] = React.useState(GAME_STATUS.MENU);

        const level = Math.floor(score / 3) + 1;
        const speed = Math.max(80, 200 - (level - 1) * 15);

        const startGame = (initialDirection = "ArrowRight") => {
          const initialSnake = createInitialSnake(initialDirection);

          setDirection(initialDirection);
          setSnake(initialSnake);
          setFood(getRandomFood(initialSnake));
          setScore(0);
          setStatus(GAME_STATUS.PLAYING);
        };

        const showMenu = () => {
          const initialSnake = createInitialSnake();

          setDirection("ArrowRight");
          setSnake(initialSnake);
          setFood(getRandomFood(initialSnake));
          setScore(0);
          setStatus(GAME_STATUS.MENU);
        };

        // Teclado → dirección
        React.useEffect(() => {
          const handleKeyDown = (e) => {
            const pressedKey =
              e.key.length === 1 ? e.key.toLowerCase() : e.key;
            const nextDirection = KEY_TO_DIRECTION[pressedKey];

            if (pressedKey === "r" && status !== GAME_STATUS.MENU) {
              e.preventDefault();
              startGame();
              return;
            }

            if (!nextDirection) {
              return;
            }

            e.preventDefault();

            if (status === GAME_STATUS.MENU) {
              startGame(nextDirection);
              return;
            }

            if (status === GAME_STATUS.GAME_OVER) {
              return;
            }

            setDirection((prevDirection) => {
              const opposites = {
                ArrowUp: "ArrowDown",
                ArrowDown: "ArrowUp",
                ArrowLeft: "ArrowRight",
                ArrowRight: "ArrowLeft",
              };

              return opposites[prevDirection] === nextDirection
                ? prevDirection
                : nextDirection;
            });
          };

          window.addEventListener("keydown", handleKeyDown);
          return () =>
            window.removeEventListener("keydown", handleKeyDown);
        }, [status]);

        // Movimiento
        React.useEffect(() => {
          if (status !== GAME_STATUS.PLAYING) {
            return;
          }

          const i = setInterval(() => {
            setSnake((prev) => {
              const head = prev[0];
              let newHead = { x: null, y: null };

              switch (direction) {
                case "ArrowRight":
                  newHead = { x: head.x + 1, y: head.y };
                  break;
                case "ArrowLeft":
                  newHead = { x: head.x - 1, y: head.y };
                  break;
                case "ArrowUp":
                  newHead = { x: head.x, y: head.y - 1 };
                  break;
                case "ArrowDown":
                  newHead = { x: head.x, y: head.y + 1 };
                  break;
              }

              const hitsWall =
                newHead.x < 1 ||
                newHead.x > BOARD_SIZE ||
                newHead.y < 1 ||
                newHead.y > BOARD_SIZE;

              const bodyWithoutTail = prev.slice(0, prev.length - 1);
              const hitsSelf = bodyWithoutTail.some(
                (part) => part.x === newHead.x && part.y === newHead.y
              );

              if (hitsWall || hitsSelf) {
                setStatus(GAME_STATUS.GAME_OVER);
                return prev;
              }

              const ateFood =
                newHead.x === food.x && newHead.y === food.y;

              const nextSnake = ateFood
                ? [newHead, ...prev]
                : [newHead, ...prev.slice(0, prev.length - 1)];

              if (ateFood) {
                setScore((current) => current + 1);
                setFood(getRandomFood(nextSnake));
              }

              return nextSnake;
            });
          }, speed);

          return () => clearInterval(i);
        }, [direction, food, speed, status]);

        const message = {
          [GAME_STATUS.MENU]:
            "Presiona iniciar o una tecla de movimiento para comenzar",
          [GAME_STATUS.PLAYING]:
            "Usa las flechas o WASD para mover la serpiente",
          [GAME_STATUS.GAME_OVER]:
            "Perdiste. Presiona jugar otra vez o R",
        }[status];

        return (
          <div className="app">
            <Score
              score={score}
              level={level}
            />
            <div className="controls">
              {status === GAME_STATUS.MENU && (
                <button onClick={() => startGame()}>Iniciar</button>
              )}
              {status === GAME_STATUS.PLAYING && (
                <button onClick={() => startGame()}>Reiniciar</button>
              )}
              {status === GAME_STATUS.GAME_OVER && (
                <button onClick={() => startGame()}>Jugar otra vez</button>
              )}
              {status !== GAME_STATUS.MENU && (
                <button onClick={showMenu}>Menú</button>
              )}
            </div>
            <div className="message">{message}</div>
            <Board
              snake={snake}
              food={food}
              status={status}
            />
          </div>
        );
      };

      const App = () => {
        return <Game />;
      };

      reactRoot.render(<App />);
    </script>
  </body>
</html>
